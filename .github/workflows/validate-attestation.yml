name: validate-attestation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block forbidden source, proof, and build files
        shell: bash
        run: |
          set -euo pipefail

          forbidden="$(find . -type f \
            \( -name '*.rs' -o -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' -o -name '*.mjs' -o -name '*.cjs' \
               -o -name '*.c' -o -name '*.cc' -o -name '*.cpp' -o -name '*.h' -o -name '*.hpp' -o -name '*.swift' \
               -o -name '*.py' -o -name '*.sh' -o -name '*.bash' -o -name '*.zsh' -o -name '*.ps1' -o -name '*.bat' \
               -o -name '*.v' -o -name '*.lean' -o -name '*.fst' -o -name '*.fsti' \
               -o -name '*.metal' -o -name '*.metallib' \
               -o -name '*.circom' -o -name '*.nr' -o -name '*.noir' -o -name '*.zkir' -o -name '*.bzkir' \
               -o -name '*.dylib' -o -name '*.a' -o -name '*.so' -o -name '*.dll' -o -name '*.exe' -o -name '*.o' -o -name '*.rlib' -o -name '*.wasm' -o -name '*.bin' \
               -o -name '*.map' \
               -o -name 'Cargo.toml' -o -name 'Cargo.lock' -o -name 'Cargo.*' -o -name '*.toml' \
               -o -name 'build.rs' -o -name 'Makefile' -o -name 'Dockerfile' \) \
            -print)"

          if [[ -n "${forbidden}" ]]; then
            echo "Forbidden files detected:"
            printf '%s\n' "${forbidden}"
            exit 1
          fi

      - name: Block unexpected binary payloads
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r file; do
            mime="$(file -b --mime-type "$file")"
            case "$mime" in
              text/*|application/json|application/x-yaml|application/xml|inode/x-empty)
                ;;
              *)
                echo "Unsupported binary or opaque payload detected: $file ($mime)"
                exit 1
                ;;
            esac
          done < <(find . -type f ! -path './.git/*')

      - name: Block unsanitized paths and token-like strings
        shell: bash
        run: |
          set -euo pipefail

          if rg -n --hidden \
            --glob '!.git/**' \
            --glob '!.github/workflows/validate-attestation.yml' \
            -e '/Users/' \
            -e '/private/var/' \
            -e 'Desktop/ZirOS' \
            -e 'target-local' \
            -e 'target-public' \
            -e 'ghp_[A-Za-z0-9_]+' \
            -e 'mn_(dust|addr)_[A-Za-z0-9_]+' \
            -e '\bsicarii\b' \
            -e '\bzkf-sdk\b' \
            -e '\bopen[- ]core\b' \
            -e '\bpublic mirror\b' \
            -e '\bzkf\.h\b' \
            -e '\bopaque C header\b' \
            -e '"evidence_path"\s*:' \
            .; then
            echo "Unsanitized path, identifier, or private evidence field detected."
            exit 1
          fi

      - name: Block fenced implementation snippets
        shell: bash
        run: |
          set -euo pipefail

          if rg -n --glob '*.md' \
            --glob '!proof-server/endpoint-spec.md' \
            '^```' .; then
            echo "Fenced code blocks are not allowed in the public evidence repo."
            exit 1
          fi

          if rg -n '^```(?!json$)' proof-server/endpoint-spec.md -g 'proof-server/endpoint-spec.md' -P; then
            echo "proof-server/endpoint-spec.md may only use json fences."
            exit 1
          fi

      - name: Validate JSON documents
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r file; do
            python -m json.tool "$file" > /dev/null
          done < <(find . -type f -name '*.json' | sort)

      - name: Validate ledger and attestation consistency
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          from pathlib import Path

          root = Path(".")
          ledger_doc = json.loads((root / "ledger/verification-ledger.json").read_text())
          summary = json.loads((root / "ledger/ledger-summary.json").read_text())
          attestation = json.loads((root / "attestation/latest.json").read_text())
          ledger = ledger_doc.get("entries", [])

          if not ledger:
              raise SystemExit("verification ledger is empty")

          bad_rows = [row["theorem_id"] for row in ledger if row.get("status") != "mechanized_local"]
          if bad_rows:
              raise SystemExit(f"non-mechanized public ledger rows detected: {bad_rows[:5]}")

          if summary.get("pending_entries", 0) != 0:
              raise SystemExit("ledger-summary.json reports pending entries")

          claim = attestation["claims_verified"]["verification_ledger"]
          if claim.get("pending", 0) != 0:
              raise SystemExit("attestation/latest.json reports pending entries")

          if claim.get("total_entries") != len(ledger):
              raise SystemExit("attestation total_entries does not match public ledger length")
          PY

      - name: Replay public attestation bundle
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path(".")
          HEADLINE_CONFORMANCE_BACKENDS = ["plonky3", "halo2", "nova", "hypernova"]
          SUPPLEMENTAL_CONFORMANCE_BACKENDS = ["arkworks-groth16"]
          CAPABILITY_MATRIX_FILES = {
              "backends": "backends.json",
              "frontends": "frontends.json",
              "gadgets": "gadgets.json",
              "post_quantum": "post-quantum.json",
          }

          def load_json(rel: str):
              return json.loads((root / rel).read_text())

          def load_claim_source(rel: str):
              path = root / rel
              if path.suffix == ".json":
                  return json.loads(path.read_text())
              return path.read_text().strip()

          def canonical_sha256(payload):
              encoded = json.dumps(payload, sort_keys=True, separators=(",", ":")).encode("utf-8")
              return hashlib.sha256(encoded).hexdigest()

          def without_keys(payload, *keys):
              clone = json.loads(json.dumps(payload))
              for key in keys:
                  clone.pop(key, None)
              return clone

          def json_pointer_get(document, pointer: str):
              if pointer == "":
                  return document
              if not pointer.startswith("/"):
                  raise SystemExit(f"invalid JSON pointer: {pointer}")
              current = document
              for raw_part in pointer[1:].split("/"):
                  part = raw_part.replace("~1", "/").replace("~0", "~")
                  if isinstance(current, list):
                      current = current[int(part)]
                  else:
                      current = current[part]
              return current

          def build_expected_conformance_summary():
              def row_for(backend: str):
                  payload = load_json(f"conformance/latest/{backend}.json")
                  return {
                      "backend": backend,
                      "path": f"conformance/latest/{backend}.json",
                      "tests_run": payload["tests_run"],
                      "tests_passed": payload["tests_passed"],
                      "tests_failed": payload["tests_failed"],
                      "status": payload.get("status", "pass" if payload["tests_failed"] == 0 else "fail"),
                  }

              headline_rows = [row_for(backend) for backend in HEADLINE_CONFORMANCE_BACKENDS]
              supplemental_rows = []
              for backend in SUPPLEMENTAL_CONFORMANCE_BACKENDS:
                  path = root / "conformance" / "latest" / f"{backend}.json"
                  if path.exists():
                      supplemental_rows.append(row_for(backend))

              published_rows = headline_rows + supplemental_rows
              headline_tests_failed = sum(row["tests_failed"] for row in headline_rows)
              published_tests_failed = sum(row["tests_failed"] for row in published_rows)
              return {
                  "headline_backend_ids": [row["backend"] for row in headline_rows],
                  "headline_backend_count": len(headline_rows),
                  "headline_tests_run": sum(row["tests_run"] for row in headline_rows),
                  "headline_tests_passed": sum(row["tests_passed"] for row in headline_rows),
                  "headline_tests_failed": headline_tests_failed,
                  "headline_status": "pass" if headline_tests_failed == 0 else "fail",
                  "published_backend_ids": [row["backend"] for row in published_rows],
                  "published_backend_count": len(published_rows),
                  "published_tests_run": sum(row["tests_run"] for row in published_rows),
                  "published_tests_passed": sum(row["tests_passed"] for row in published_rows),
                  "published_tests_failed": published_tests_failed,
                  "published_status": "pass" if published_tests_failed == 0 else "fail",
                  "headline_rows": headline_rows,
                  "supplemental_rows": supplemental_rows,
              }

          def build_expected_capability_summary(version: str):
              payloads = {}
              for key, filename in CAPABILITY_MATRIX_FILES.items():
                  payload = load_json(f"capability-matrix/{filename}")
                  if payload.get("generated_for") != version:
                      raise SystemExit(
                          f"capability matrix {filename} generated_for={payload.get('generated_for')} != {version}"
                      )
                  payloads[key] = payload
              return {
                  "backend_count": len(payloads["backends"]["backends"]),
                  "backend_ids": [entry["id"] for entry in payloads["backends"]["backends"]],
                  "frontend_count": len(payloads["frontends"]["frontends"]),
                  "frontend_ids": [entry["id"] for entry in payloads["frontends"]["frontends"]],
                  "gadget_count": len(payloads["gadgets"]["gadgets"]),
                  "gadget_ids": [entry["id"] for entry in payloads["gadgets"]["gadgets"]],
                  "post_quantum_component_count": len(payloads["post_quantum"]["components"]),
                  "post_quantum_components": [
                      entry["component"] for entry in payloads["post_quantum"]["components"]
                  ],
              }

          attestation = load_json("attestation/latest.json")
          evidence = load_json("evidence/evidence-package.json")
          publication = load_json("publication/manifest.json")
          claim_graph = load_json("claim-source-graph.json")
          hostile_verdict = load_json("hostile-audit-verdict.json")
          workspace_census_summary = load_json("workspace-census-summary.json")
          conformance_summary = load_json("evidence/conformance-summary.json")
          capability_summary = load_json("evidence/capability-summary.json")
          proof_inventory = load_json("evidence/proof-file-inventory.json")
          ledger_file_sha = (root / "ledger/ledger-sha256.txt").read_text().strip()

          computed_attestation_hash = canonical_sha256(without_keys(attestation, "attestation_hash"))
          if computed_attestation_hash != attestation["attestation_hash"]:
              raise SystemExit("attestation hash does not match payload")

          computed_graph_digest = canonical_sha256(
              {
                  "schema": claim_graph["schema"],
                  "generated_at": claim_graph["generated_at"],
                  "claims": claim_graph["claims"],
              }
          )
          if computed_graph_digest != claim_graph["graph_digest"]:
              raise SystemExit("claim-source graph digest does not match graph payload")
          if computed_graph_digest != attestation["claim_source_graph_digest"]:
              raise SystemExit("attestation and claim-source graph digests disagree")
          if computed_graph_digest != hostile_verdict["claim_source_graph_digest"]:
              raise SystemExit("hostile-audit verdict and claim-source graph digests disagree")
          if computed_graph_digest != evidence["claim_source_graph_digest"]:
              raise SystemExit("evidence package and claim-source graph digests disagree")

          computed_hostile_digest = canonical_sha256(hostile_verdict)
          if computed_hostile_digest != evidence["hostile_audit_verdict_digest"]:
              raise SystemExit("evidence package hostile-audit verdict digest does not match verdict payload")

          if evidence["publication"] != publication:
              raise SystemExit("evidence package publication manifest is out of sync")
          if evidence["workspace_census_summary"] != workspace_census_summary:
              raise SystemExit("evidence package workspace census summary is out of sync")
          if evidence["attestation"] != attestation:
              raise SystemExit("evidence package attestation payload is out of sync")

          if proof_inventory["schema"] != "zkf-public-proof-file-inventory-v2":
              raise SystemExit("unexpected proof-file inventory schema")

          if ledger_file_sha != attestation["claims_verified"]["verification_ledger"]["file_sha256"]:
              raise SystemExit("attestation ledger file SHA-256 does not match ledger-sha256.txt")
          computed_ledger_file_sha = hashlib.sha256(
              (root / "ledger/verification-ledger.json").read_bytes()
          ).hexdigest()
          if computed_ledger_file_sha != ledger_file_sha:
              raise SystemExit("ledger-sha256.txt does not match verification-ledger.json")

          expected_conformance = build_expected_conformance_summary()
          for key, expected_value in expected_conformance.items():
              if conformance_summary.get(key) != expected_value:
                  raise SystemExit(f"conformance-summary mismatch for {key}")

          expected_capability = build_expected_capability_summary(publication["published_release_version"])
          for key, expected_value in expected_capability.items():
              if capability_summary.get(key) != expected_value:
                  raise SystemExit(f"capability-summary mismatch for {key}")

          for name, rel in evidence["artifact_index"].items():
              if not (root / rel).exists():
                  raise SystemExit(f"artifact_index entry {name} points to missing path {rel}")

          for claim in claim_graph["claims"]:
              expected = claim["expected_value"]
              if claim.get("aggregate") == "sum":
                  total = 0
                  for component in claim["components"]:
                      total += int(json_pointer_get(load_json(component["path"]), component["json_pointer"]))
                  if total != expected:
                      raise SystemExit(f"claim {claim['claim_id']} expected {expected}, recomputed {total}")
                  for corroborating_source in claim.get("corroborating_sources", []):
                      value = json_pointer_get(
                          load_json(corroborating_source["path"]),
                          corroborating_source["json_pointer"],
                      )
                      if value != expected:
                          raise SystemExit(
                              f"claim {claim['claim_id']} mismatch at "
                              f"{corroborating_source['path']}{corroborating_source['json_pointer']}"
                          )
                  continue

              for source in claim["sources"]:
                  value = json_pointer_get(load_claim_source(source["path"]), source["json_pointer"])
                  if value != expected:
                      raise SystemExit(
                          f"claim {claim['claim_id']} mismatch at {source['path']}{source['json_pointer']}"
                      )

          expected_explicit_tcb = workspace_census_summary["coverage_state_counts"].get("explicit_tcb", 0)
          if hostile_verdict["summary"]["explicit_tcb_files"] != expected_explicit_tcb:
              raise SystemExit("hostile-audit verdict explicit_tcb_files does not match workspace census summary")
          if hostile_verdict["summary"]["zero_unclassified_files"] != workspace_census_summary["zero_unclassified_files"]:
              raise SystemExit("hostile-audit verdict zero_unclassified_files does not match workspace census summary")

          if attestation["headline_counts"]["implementation_bound_rows"] != attestation["claims_verified"]["verification_ledger"]["implementation_bound_rows"]:
              raise SystemExit("headline implementation count does not match verification_ledger implementation count")
          if attestation["headline_counts"]["hypothesis_carried_rows"] != attestation["hypothesis_registry"]["count"]:
              raise SystemExit("headline hypothesis count does not match hypothesis registry count")
          PY
